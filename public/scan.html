<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>QR Scanner - Voting Machine</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#04091A; color:#fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; gap:12px;
      padding:60px 14px 20px;
    }
    h1 {
      font-size:1.4rem; font-weight:900;
      background:linear-gradient(135deg,#fff 30%,#3b82f6 100%);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent; text-align:center;
    }
    /* ── HTTPS Warning ── */
    #https-warn {
      display:none; width:100%; max-width:440px;
      background:#7f1d1d; border:1px solid #ef4444;
      border-radius:12px; padding:12px 14px;
      font-size:0.82rem; color:#fca5a5; line-height:1.5;
    }
    /* ── Camera ── */
    .cam-wrap {
      position:relative; width:100%; max-width:440px;
      border-radius:18px; overflow:hidden;
      background:#000; aspect-ratio:4/3;
      border:2px solid rgba(59,130,246,0.4);
      box-shadow:0 0 40px rgba(59,130,246,0.18);
    }
    #v { width:100%; height:100%; object-fit:cover; display:block; }
    .scan-line {
      position:absolute; left:0; right:0; height:3px;
      background:linear-gradient(90deg,transparent,#3b82f6,transparent);
      box-shadow:0 0 10px #3b82f6;
      animation:sweep 1.6s ease-in-out infinite;
    }
    @keyframes sweep { 0%{top:5%} 50%{top:92%} 100%{top:5%} }
    .corners {
      position:absolute; inset:0; pointer-events:none;
    }
    .corners::before,.corners::after {
      content:''; position:absolute;
      width:48px; height:48px;
      border-color:#3b82f6; border-style:solid;
    }
    .corners::before { top:14px; left:14px; border-width:4px 0 0 4px; border-radius:6px 0 0 0; }
    .corners::after  { bottom:14px; right:14px; border-width:0 4px 4px 0; border-radius:0 0 6px 0; }
    /* ── Status ── */
    .sbar {
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.09);
      border-radius:12px; padding:11px 14px;
      width:100%; max-width:440px;
    }
    .dot {
      width:10px; height:10px; border-radius:50%;
      flex-shrink:0; animation:p 1s ease-in-out infinite;
      background:#22c55e; box-shadow:0 0 8px #22c55e;
    }
    .dot.spin  { background:#f59e0b; box-shadow:0 0 8px #f59e0b; }
    .dot.err   { background:#ef4444; box-shadow:0 0 8px #ef4444; animation:none; }
    .dot.ready { background:#3b82f6; box-shadow:0 0 14px #3b82f6; animation:none; }
    @keyframes p { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.4);opacity:.3} }
    #stxt { font-size:0.8rem; color:#94a3b8; flex:1; }
    /* ── Manual fallback ── */
    .manual {
      width:100%; max-width:440px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.09);
      border-radius:14px; padding:14px;
    }
    .manual p { font-size:0.78rem; color:#64748b; margin-bottom:8px; text-align:center; }
    .manual-row { display:flex; gap:8px; }
    #manual-in {
      flex:1; background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:10px; padding:10px 12px;
      color:#fff; font-size:0.9rem; font-family:inherit;
      text-transform:uppercase;
    }
    #manual-in::placeholder { color:#475569; }
    #manual-btn {
      padding:10px 20px;
      background:linear-gradient(135deg,#1d4ed8,#3b82f6);
      border:none; color:#fff; border-radius:10px;
      cursor:pointer; font-size:0.9rem; font-weight:700;
      font-family:inherit;
    }
    /* ── Log ── */
    #dbg {
      width:100%; max-width:440px;
      background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.06);
      border-radius:10px; padding:8px 10px;
      font-family:monospace; font-size:0.67rem;
      max-height:85px; overflow-y:auto; color:#475569;
    }
    /* ── Success ── */
    #success {
      display:none; position:fixed; inset:0;
      background:rgba(16,185,129,.2);
      backdrop-filter:blur(12px); z-index:9999;
      flex-direction:column; align-items:center; justify-content:center; gap:12px;
      animation:fi .15s ease;
    }
    #success.on { display:flex; }
    @keyframes fi { from{opacity:0} to{opacity:1} }
    .s-icon { font-size:5rem; animation:pop .35s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop { from{transform:scale(.05);opacity:0} to{transform:scale(1);opacity:1} }
    .s-title { font-size:1.7rem; font-weight:900; color:#4ade80; }
    .s-sub   { color:#86efac; font-size:.9rem; }
    .back {
      position:fixed; top:13px; left:13px; color:#64748b;
      text-decoration:none; font-size:.75rem;
      padding:6px 11px; border-radius:9px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.03); z-index:200;
    }
  </style>
</head>
<body>

<a href="/" class="back">← Home</a>

<!-- Success -->
<div id="success">
  <div class="s-icon">✅</div>
  <div class="s-title">QR Scanned!</div>
  <div class="s-sub" id="sid">Redirecting…</div>
</div>

<h1>📷 Show Your QR Code</h1>

<!-- HTTPS warning - shown when camera won't work -->
<div id="https-warn">
  ⚠️ <strong>Camera blocked by browser!</strong><br>
  Mobile browsers require <strong>HTTPS</strong> to access the camera.<br>
  You're on HTTP. Either:<br>
  • Access via <code>localhost</code> on this device<br>
  • Or use the manual entry below ↓
</div>

<div class="cam-wrap">
  <video id="v" autoplay muted playsinline></video>
  <div class="corners"></div>
  <div class="scan-line"></div>
</div>

<canvas id="c" style="display:none"></canvas>

<div class="sbar">
  <div class="dot spin" id="dot"></div>
  <span id="stxt">Starting camera…</span>
</div>

<!-- Manual voter ID entry fallback -->
<div class="manual">
  <p>📝 Camera not working? Enter Voter ID manually:</p>
  <div class="manual-row">
    <input id="manual-in" type="text" placeholder="e.g. VID001 or 001" autocomplete="off" spellcheck="false">
    <button id="manual-btn" onclick="manualSubmit()">Go →</button>
  </div>
</div>

<div id="dbg"></div>

<script>
  const vid     = document.getElementById('v');
  const canvas  = document.getElementById('c');
  // willReadFrequently = GPU → CPU optimized path
  const ctx     = canvas.getContext('2d', { willReadFrequently: true, alpha: false });
  const dot     = document.getElementById('dot');
  const stxt    = document.getElementById('stxt');
  const dbg     = document.getElementById('dbg');
  const success = document.getElementById('success');
  const sidEl   = document.getElementById('sid');
  const warnEl  = document.getElementById('https-warn');
  const manIn   = document.getElementById('manual-in');

  // ── SPEED CONFIG ──────────────────────────────────────────────────────────
  // Downscale resolution for jsQR: fewer pixels = MUCH faster decode
  // 320x240 = 76,800 pixels vs 1280x720 = 921,600 pixels (12x faster!)
  const SCAN_W = 320, SCAN_H = 240;
  canvas.width  = SCAN_W;
  canvas.height = SCAN_H;

  let stream = null, rafId = null, done = false;
  const hasNative = typeof BarcodeDetector !== 'undefined';
  let   nativeDetector = null;
  let   scanStart = 0;

  function log(msg, color) {
    const el = document.createElement('div');
    el.style.color = color || '#475569';
    el.textContent = new Date().toLocaleTimeString('en',{hour12:false}) + ' ' + msg;
    dbg.appendChild(el);
    dbg.scrollTop = dbg.scrollHeight;
    if (dbg.children.length > 25) dbg.removeChild(dbg.firstChild);
  }

  function setStatus(cls, msg) {
    dot.className  = 'dot ' + (cls || '');
    stxt.textContent = msg;
  }

  // Normalize: '0001'→'VID0001', '5000'→'VID5000', 'VID5000'→'VID5000'
  function normalize(raw) {
    let s = raw.trim().toUpperCase().replace(/^["']+|["']+$/g, '');
    if (/^\d+$/.test(s)) s = 'VID' + s.padStart(4, '0');
    return s;
  }

  // ── Detected! ─────────────────────────────────────────────────────────────
  function onDetected(rawText) {
    if (done) return;
    done = true;
    const elapsed = Date.now() - scanStart;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (stream) stream.getTracks().forEach(t => t.stop());
    const vid_str = normalize(rawText);
    log('✅ ' + vid_str + ' in ' + elapsed + 'ms', '#4ade80');
    setStatus('ready', 'Scanned in ' + elapsed + 'ms! Redirecting…');
    sidEl.textContent = 'Voter ID: ' + vid_str;
    success.classList.add('on');
    setTimeout(() => { window.location.href = '/?vid=' + encodeURIComponent(vid_str); }, 100);
  }

  function manualSubmit() {
    const val = manIn.value.trim();
    if (!val) { manIn.focus(); return; }
    onDetected(val);
  }
  manIn.addEventListener('keypress', e => { if (e.key === 'Enter') manualSubmit(); });

  // ── Native BarcodeDetector — DIRECT VIDEO, no canvas, hardware-accelerated ─
  // This is the fastest possible path on Chrome Android (sub-100ms)
  function nativeLoop() {
    if (done) return;
    if (vid.readyState < vid.HAVE_ENOUGH_DATA || !vid.videoWidth) {
      rafId = requestAnimationFrame(nativeLoop); return;
    }
    nativeDetector.detect(vid)
      .then(codes => {
        if (codes.length) { onDetected(codes[0].rawValue); return; }
        if (!done) rafId = requestAnimationFrame(nativeLoop);
      })
      .catch(() => { if (!done) rafId = requestAnimationFrame(nativeLoop); });
  }

  // ── jsQR loop — downscaled canvas for maximum throughput ──────────────────
  // Drawing 1280x720 video into 320x240 canvas = 12x less work for jsQR
  function jsqrLoop() {
    if (done) return;
    if (vid.readyState >= vid.HAVE_ENOUGH_DATA && vid.videoWidth) {
      // Draw video scaled DOWN into small canvas — this is the key speed trick
      ctx.drawImage(vid, 0, 0, SCAN_W, SCAN_H);
      const img  = ctx.getImageData(0, 0, SCAN_W, SCAN_H);
      const code = jsQR(img.data, SCAN_W, SCAN_H, { inversionAttempts: 'attemptBoth' });
      if (code) { onDetected(code.data); return; }
    }
    rafId = requestAnimationFrame(jsqrLoop);
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  async function boot() {
    done = false;
    setStatus('spin', 'Starting camera…');

    const isSecure = location.protocol === 'https:'
      || location.hostname === 'localhost'
      || location.hostname === '127.0.0.1';
    if (!isSecure) warnEl.style.display = 'block';

    if (hasNative) {
      try {
        nativeDetector = new BarcodeDetector({ formats: ['qr_code'] });
        log('✅ Native BarcodeDetector (fastest)', '#86efac');
      } catch(e) { log('⚠ Native unavailable', '#fbbf24'); }
    }
    if (!hasNative) log('📦 jsQR engine @320×240 (fast)', '#93c5fd');

    if (typeof jsQR === 'undefined') {
      setStatus('err', 'jsQR failed to load — check internet');
      return;
    }

    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      vid.srcObject = stream;
      await vid.play();

      const s = stream.getVideoTracks()[0].getSettings();
      log(`📷 ${s.width}×${s.height}`, '#93c5fd');
      setStatus('', '⚡ Scanning…');

      // ── START SCANNING IMMEDIATELY — no delay! ──────────────────────────
      scanStart = Date.now();
      if (nativeDetector) {
        log('▶ Native scan started', '#86efac');
        rafId = requestAnimationFrame(nativeLoop);
      } else {
        log('▶ jsQR scan started @320×240', '#93c5fd');
        rafId = requestAnimationFrame(jsqrLoop);
      }

    } catch (err) {
      log('❌ ' + err.name + ': ' + err.message, '#fca5a5');
      if (err.name === 'NotAllowedError') {
        setStatus('err', 'Camera denied — use manual entry below');
        if (!isSecure) warnEl.style.display = 'block';
      } else {
        setStatus('err', err.message);
      }
    }
  }

  boot();
</script>

</body>
</html>
